
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">

<title>The Important Problem</title>
<style>
:root{
--bg:#0D0D0C; --panel:#141413; --panel2:#0F0F0E;
--ink:#FFFFFF; --soft:#C5C5C2; --muted:#757572;
--line:rgba(255,255,255,.058); --line2:rgba(255,255,255,.11);
--accent:rgba(255,255,255,.36); --grid:rgba(255,255,255,.0055);
--shadow:rgba(0,0,0,.80); --gold:#D4B24B;
--ui-bg:#0C0C0C; --ui-panel:#161616; --ui-border:rgba(255,255,255,.09); --ui-ink:#EDEDEB;
--sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Segoe UI",Roboto,Arial,sans-serif;
}
[data-theme="chalk"]{
--bg:#F4F3F0; --panel:#FFFFFF; --panel2:#FBFAF7;
--ink:#0E0E0C; --soft:#3A3A36; --muted:#8A8A82;
--line:rgba(0,0,0,.07); --line2:rgba(0,0,0,.12);
--accent:rgba(0,0,0,.34); --grid:rgba(0,0,0,.014);
--shadow:rgba(20,20,40,.14); --gold:#A6802A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ui-bg);color:var(--ui-ink);font-family:var(--sans);
-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;
display:flex;min-height:100vh}

/* ===== LEFT CONTROL PANEL ===== */
.panel-ctrl{width:340px;flex-shrink:0;background:var(--ui-panel);
border-right:1px solid var(--ui-border);padding:24px;overflow-y:auto;height:100vh}

.ctrl-label{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.5);margin:18px 0 8px}
textarea{width:100%;height:160px;background:#0A0A0A;border:1px solid var(--ui-border);
border-radius:8px;color:#ddd;font-family:Georgia,serif;font-size:13px;line-height:1.5;padding:12px;resize:vertical}
.row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
select,.btn-ctrl{background:#0A0A0A;border:1px solid var(--ui-border);border-radius:7px;

.btn-ctrl{background:#1d1d1d;font-weight:600;letter-spacing:.3px}
.btn-ctrl:hover{background:#262626;color:#fff}
.btn-primary{width:100%;background:var(--gold);color:#0A0A0A;border:none;border-radius:8px;

.btn-primary:hover{filter:brightness(1.08)}
.page-roles{margin-top:6px}
.role-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}

/* ===== RIGHT STAGE ===== */

.stage{position:relative;z-index:2;width:100%;max-width:880px;flex:1;display:flex;align-items:center;justify-content:center}

/* ===== PRESENT MODE — the jewel alone, no controls ===== */

.line{display:block}
.para{margin-bottom:18px}.para:last-child{margin-bottom:0}

border:1px solid var(--line);border-radius:999px;padding:8px 20px;box-shadow:0 12px 36px var(--shadow)}
.group{display:flex;align-items:center;gap:7px}
.sep{width:1px;height:18px;background:var(--line)}

<script>
const DATA={"eyebrow":"The Important Problem","theme":"obsidian","pages":[{"text":"\n\nPassion Is the Protagonist\n Life is a miracle, and we must live as a miracle. For most of my life, one word has quietly lived underneath that belief:","role":"open","label":"Opening","heroIdx":null},{"text":"Passion. I know that sounds dramatic. It is. Birth is dramatic. Love is dramatic. Death is dramatic. Existence itself is dramatic.","role":"recognition","label":"Recognition","heroIdx":null},{"text":"The strange thing is that most people spend their lives surrounded by miracles while feeling remarkably little about them. A beating heart becomes normal.","role":"method","label":"Method","heroIdx":null},{"text":"A sunrise becomes background scenery. A conversation becomes routine. A family becomes expected. Another birthday passes. Another year passes.","role":"definition","label":"Definition","heroIdx":null},{"text":"Another decade passes. Then one day something happens. A diagnosis. A loss. A betrayal. A panic attack. A funeral. A close call.","role":"law","label":"Law","heroIdx":null},{"text":"And suddenly the person realizes what was true all along: None of this was guaranteed. Not one day. Not one breath. Not one moment.","role":"practice","label":"Practice","heroIdx":null},{"text":"For years I have listened to people ask the same question. “What is my purpose?” Social media asks it. Self-help books ask it. Career coaches ask it.","role":"resistance","label":"Resistance","heroIdx":null},{"text":"Influencers ask it. Even therapists sometimes ask it. The assumption behind the question is always the same. Somewhere out there is a perfect calling.","role":"pattern","label":"Pattern","heroIdx":null},{"text":"A perfect career. A perfect mission. A perfect passion. Find it and your life finally begins. Fail to find it and something must be wrong with you.","role":"metaphor","label":"Metaphor","heroIdx":null},{"text":"The more I reflected on that idea, the less sense it made. Who decided that passion was something we find? Who told us that?","role":"recognition","label":"Recognition","heroIdx":null},{"text":"Who convinced us that passion is hiding somewhere waiting to be discovered? Maybe passion is not something we find. Maybe passion is something we practice.","role":"method","label":"Method","heroIdx":null},{"text":"Maybe the goal is not to find passion. Maybe the goal is to become a passionate person. For most of my life, passion was not a philosophy.","role":"definition","label":"Definition","heroIdx":null},{"text":"It was simply how I lived. As a child, I did not need to win to feel alive. I could enjoy the game even when I was losing.","role":"law","label":"Law","heroIdx":null},{"text":"I could bring enthusiasm to the activity even when I was not the best player. The fire was there before I had language for it.","role":"practice","label":"Practice","heroIdx":null},{"text":"Only later did I begin to understand it. Most people treat passion like an object. I see it as a way of being. Most people think passion is the reward.","role":"resistance","label":"Resistance","heroIdx":null},{"text":"I think passion is the practice. Most people think passion is the destination. I think passion is the vehicle. That distinction matters.","role":"pattern","label":"Pattern","heroIdx":null},{"text":"Because if passion is a destination, many people will spend years searching. If passion is a practice, they can begin today. Right now. This minute.","role":"metaphor","label":"Metaphor","heroIdx":null},{"text":"With whatever is already in front of them. I have a saying that usually makes people laugh. We should even go to the bathroom with passion.","role":"recognition","label":"Recognition","heroIdx":null},{"text":"The first time people hear it, they assume I am joking. I am. And I am not.","role":"method","label":"Method","heroIdx":null},{"text":"Because hidden inside that ridiculous sentence is one of the most important lessons I have learned.","role":"definition","label":"Definition","heroIdx":null},{"text":"The way we do something is often the way we do almost everything.","role":"law","label":"Law","heroIdx":null},{"text":"If I spend years approaching life half asleep, why would I suddenly become fully alive when something important appears?","role":"practice","label":"Practice","heroIdx":null},{"text":"If I rush through conversations, why would I become deeply present in love?","role":"resistance","label":"Resistance","heroIdx":null},{"text":"If I avoid effort in small things, why would I suddenly become disciplined in big things? If I live mechanically, why would I suddenly become passionate?","role":"pattern","label":"Pattern","heroIdx":null},{"text":"Practice is always happening. The only question is what we are practicing. Every day we are rehearsing a way of living. We are rehearsing enthusiasm.","role":"metaphor","label":"Metaphor","heroIdx":null},{"text":"Or rehearsing indifference. Rehearsing gratitude. Or rehearsing resentment. Rehearsing engagement. Or rehearsing numbness.","role":"recognition","label":"Recognition","heroIdx":null},{"text":"Little by little, those rehearsals become character. Character becomes identity. Identity becomes destiny. That is why I believe passion is an art.","role":"method","label":"Method","heroIdx":null},{"text":"Not unlike love. In *The Art of Loving*, Erich Fromm argued that love is not merely a feeling that happens to us. Love requires discipline. Attention.","role":"definition","label":"Definition","heroIdx":null},{"text":"Practice. Humility. Commitment. What if passion belongs in the same family? What if passion is not only an emotion? What if passion is also a discipline?","role":"law","label":"Law","heroIdx":null},{"text":"An art of showing up. An art of participating. An art of bringing life to life.","role":"practice","label":"Practice","heroIdx":null},{"text":"While writing this article and reflecting on years of clinical work, I found myself wondering what some of my intellectual mentors had said about this subject.","role":"resistance","label":"Resistance","heroIdx":null},{"text":"I was not looking for permission. I was looking for understanding. Had anyone explored passion as a way of living rather than something to be found?","role":"pattern","label":"Pattern","heroIdx":null},{"text":"Had anyone argued that the quality of our engagement with life might matter more than the specific object of that engagement? So I went searching.","role":"metaphor","label":"Metaphor","heroIdx":null},{"text":"What I found surprised me. Although they used different language and lived in different centuries, many seemed to be circling the same fire.","role":"recognition","label":"Recognition","heroIdx":null},{"text":"Søren Kierkegaard believed passion was essential to authentic existence.","role":"method","label":"Method","heroIdx":null},{"text":"Nietzsche challenged human beings to become artists of their own lives rather than passive spectators.","role":"definition","label":"Definition","heroIdx":null},{"text":"Camus refused to wait for life to provide a grand cosmic meaning before engaging with it fully. Even modern psychology points in a similar direction.","role":"law","label":"Law","heroIdx":null},{"text":"Researchers studying vitality, zest, enthusiasm, and engagement consistently find that people who actively participate in life tend to experience greater well-being than those who withdraw from it.","role":"practice","label":"Practice","heroIdx":null},{"text":"But if I am honest, books did not convince me. The therapy room did. For years I have sat across from people facing anxiety. Depression. Cancer. Chronic pain.","role":"resistance","label":"Resistance","heroIdx":null},{"text":"Panic attacks. Divorce. Loneliness. Betrayal. Fear of death. And despite the differences in their stories, I kept seeing the same pattern.","role":"pattern","label":"Pattern","heroIdx":null},{"text":"Many people were waiting for life to begin. When my health improves. When my finances improve. When I retire. When I find the right person.","role":"metaphor","label":"Metaphor","heroIdx":null},{"text":"When the anxiety goes away. When the children are older. When things finally calm down. Then I will live. Then I will enjoy myself.","role":"recognition","label":"Recognition","heroIdx":null},{"text":"Then I will become passionate. The problem is that life rarely arrives in perfect condition. There is always another challenge. Another uncertainty.","role":"method","label":"Method","heroIdx":null},{"text":"Another reason to postpone aliveness. As a therapist, one of the ideas I return to repeatedly is simple: It is not enough to be okay.","role":"definition","label":"Definition","heroIdx":null},{"text":"Many people spend years trying to reduce symptoms. That matters. But being okay is not the finish line. I want people to show aliveness. To participate.","role":"law","label":"Law","heroIdx":null},{"text":"To engage. To bring themselves back into their own lives. Eventually I realized something.","role":"practice","label":"Practice","heroIdx":null},{"text":"People often believe purpose is the protagonist of a meaningful life. Others think happiness is the protagonist. Some think success is the protagonist.","role":"resistance","label":"Resistance","heroIdx":null},{"text":"Others choose meaning. I disagree. I think passion is the protagonist. Purpose benefits from passion. Love benefits from passion.","role":"pattern","label":"Pattern","heroIdx":null},{"text":"Learning benefits from passion. Friendship benefits from passion. Work benefits from passion. Meaning benefits from passion.","role":"metaphor","label":"Metaphor","heroIdx":null},{"text":"Even suffering changes when passion enters the room. Not because pain disappears. Because the person remains alive inside the pain.","role":"recognition","label":"Recognition","heroIdx":null},{"text":"That may be the most important distinction of all. Passion does not eliminate reality. Passion changes our relationship with reality.","role":"method","label":"Method","heroIdx":null},{"text":"A person can be grieving and still passionate. A person can be sick and still passionate. A person can be afraid and still passionate.","role":"definition","label":"Definition","heroIdx":null},{"text":"A person can be eighty years old and still passionate. Passion is not reserved for youth. Passion is not reserved for success.","role":"law","label":"Law","heroIdx":null},{"text":"Passion is not reserved for people with easy lives. Passion belongs to anyone willing to practice it.","role":"practice","label":"Practice","heroIdx":null},{"text":"The older I get, the more I believe the real tragedy is not death. The real tragedy is reaching death without fully participating in life.","role":"resistance","label":"Resistance","heroIdx":null},{"text":"I have met older adults who were more alive than people fifty years younger.","role":"pattern","label":"Pattern","heroIdx":null},{"text":"I have met individuals carrying enormous burdens who still brought curiosity, humor, gratitude, and presence into every room they entered.","role":"metaphor","label":"Metaphor","heroIdx":null},{"text":"They understood something many people miss. Life is not waiting somewhere in the future. Life is happening now. This conversation. This meal. This walk.","role":"recognition","label":"Recognition","heroIdx":null},{"text":"This struggle. This breath. This ordinary Tuesday. This moment. Maybe the question is not: “What is my passion?” Maybe the better question is:","role":"method","label":"Method","heroIdx":null},{"text":"“Have I learned how to live passionately?” Because passion is not merely something we feel. Passion is something we practice.","role":"definition","label":"Definition","heroIdx":null},{"text":"And if we practice it long enough, it stops being an emotion. It becomes a way of being. Life is a miracle. Passion is the art of living like we know it.","role":"close","label":"Closing","heroIdx":null}]};
const PAGES=DATA.pages; let active=0;
const ROMAN=["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV"];
if(DATA.theme==='chalk') document.documentElement.setAttribute('data-theme','chalk');

function esc(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}
function asSentences(t){
const byLine=t.split(/\n+/).map(x=>x.trim()).filter(Boolean);
const out=[];
for(const line of byLine){
const parts=line.match(/.+?(?:[.!?:]["\u201d\u2019)]?(?=\s|$)|$)/g)||[line];
parts.forEach(p=>{const s=p.trim();if(s)out.push(s);});
}
return out.length?out:[t.trim()];
}
function isTitleLine(s){return s.length>0 && !/[.!?:]["\u201d\u2019)]?$/.test(s);}
function isDependentLine(s){const t=s.trim();
if(/^(and|but|or|so|because|yet|then|thus|for|nor|as|if|when|while|since|that|which|who|though|although|however|therefore)\b/i.test(t))return true;
if(/[,:;]$/.test(t))return true;
if(/\b(and|but|or|because|so|that|which|of|to|the|a|an|with|for|in|on)$/i.test(t.replace(/[.!?]$/,'')))return true;
return false;}
function heroAestheticScore(line,idx,n,role){const len=line.trim().length;let score=0;
if(len>=18&&len<=70)score+=40;else if(len<18)score+=Math.max(0,40-(18-len)*2.2);else score+=Math.max(0,40-(len-70)*0.5);
if(isDependentLine(line))score-=28;
if(/[.!?]["\u201d\u2019)]?$/.test(line.trim()))score+=14;
const isEdge=(idx===0||idx===n-1);if(isEdge)score+=8;
if(role==='open'&&idx===0)score+=12;if(role!=='open'&&idx===n-1)score+=12;
if(len>=18&&len<=42&&!isDependentLine(line))score+=10;
return score;}
function defaultHeroIdx(role,n,sentences){if(n<=1)return 0;
if(!sentences||!sentences.length){return (role==='open')?0:n-1;}
let best=0,bestScore=-Infinity;
for(let i=0;i<sentences.length;i++){let sc=heroAestheticScore(sentences[i],i,n,role);
if(role==='open'&&i===0)sc+=0.5;if(role!=='open'&&i===n-1)sc+=0.5;
if(sc>bestScore){bestScore=sc;best=i;}}
return best;}
function heroIndexFor(page,n){if(page.heroIdx!=null&&page.heroIdx>=0&&page.heroIdx<n)return page.heroIdx;const s=asSentences(page.text);return defaultHeroIdx(page.role,n,s);}
function renderRole(page){
let s=asSentences(page.text); const role=page.role;
let titleHtml='';
if(s.length>1 && isTitleLine(s[0])){
const tl=s[0].length; const tcls=tl<=28?'h-force-xl':tl<=55?'h-force-l':'h-force-m';
titleHtml='<div class="'+tcls+' para" style="margin-bottom:18px">'+esc(s[0])+'</div><div class="rule"></div>';
s=s.slice(1);
}
const n=s.length; const hIdx=heroIndexFor(page,n); const hero=s[hIdx];
const before=s.slice(0,hIdx); const after=s.slice(hIdx+1);
const SOUL=(role==='recognition'||role==='metaphor'||role==='close'||role==='definition'||role==='pattern');
const fam=SOUL?'soul':'force';
const L=hero.length; let tier;
if(L<=42)tier='xl'; else if(L<=78)tier='l'; else if(L<=120)tier='m'; else tier='s';
let heroCls='h-'+fam+'-'+tier;
if(titleHtml){const order=['xl','l','m','s'];const idx=Math.min(order.indexOf(tier)+1,order.length-1);heroCls='h-'+fam+'-'+order[idx];}
if(role==='recognition'&&n===1&&!titleHtml){const m=hero.match(/^(.*?:)\s*(.+)$/);if(m)return '<div class="para"><div class="setup">'+esc(m[1])+'</div><div class="quote">'+esc(m[2])+'</div></div>';}
const supportBefore=before.length?'<div class="body para" style="opacity:.92">'+esc(before.join(' '))+'</div>':'';
const supportAfter=after.length?'<div class="body para" style="opacity:.92;margin-top:14px">'+esc(after.join(' '))+'</div>':'';
const divTop=before.length?'<div class="quietRule"></div>':'';
const sig=(role==='close')?'<div class="signature"><div class="name">Manuel Acosta</div><div class="cred">LMHC · Miami, Florida</div></div>':'';
const heroLine='<div class="'+heroCls+' para'+(role==='close'?' gold-line':'')+'">'+esc(hero)+'</div>';
return titleHtml+supportBefore+divTop+heroLine+supportAfter+sig;
}
function render(t){
if(!PAGES.length)return; const p=PAGES[active], card=document.getElementById('card');
const draw=()=>{
document.getElementById('eye').textContent=DATA.eyebrow||p.label;
document.getElementById('series').textContent=p.label;
document.getElementById('idx').textContent=String(active+1).padStart(2,'0')+' / '+String(PAGES.length).padStart(2,'0');
document.getElementById('roman').textContent=ROMAN[active]||(active+1);
document.getElementById('content').innerHTML=renderRole(p);
if(t)card.style.opacity=1;
};
if(t){card.style.opacity=0;setTimeout(draw,180);}else draw();
document.getElementById('prev').disabled=active===0;
document.getElementById('next').disabled=active===PAGES.length-1;
const dots=document.getElementById('dots');dots.innerHTML='';
if(PAGES.length<=14){PAGES.forEach((_,i)=>{const b=document.createElement('button');b.className='dot-nav'+(i===active?' active':'');b.onclick=()=>{active=i;render(true);};dots.appendChild(b);});}
else{const s=document.createElement('span');s.style.cssText='font-size:12px;font-weight:700;letter-spacing:1px;color:var(--ink);min-width:74px;text-align:center';s.textContent=(active+1)+' / '+PAGES.length;dots.appendChild(s);}
}
function go(d){const n=active+d;if(n>=0&&n<PAGES.length){active=n;render(true);}}
function vtheme(t){document.documentElement.removeAttribute('data-theme');
if(t==='chalk'){document.documentElement.setAttribute('data-theme','chalk');document.getElementById('chalk').classList.add('active');document.getElementById('obsidian').classList.remove('active');}
else{document.getElementById('obsidian').classList.add('active');document.getElementById('chalk').classList.remove('active');}}
if(DATA.theme==='chalk'){document.getElementById('chalk').classList.add('active');document.getElementById('obsidian').classList.remove('active');}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
render(false);
</script></body></html>
